<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lerisfood</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#fff7ef;color:#271b14;min-height:100vh}
    header{max-width:1000px;margin:14px auto;padding:12px;background:white;border-radius:20px;display:flex;justify-content:space-between;gap:10px;align-items:center;box-shadow:0 8px 24px #0001;position:sticky;top:10px;z-index:10}
    .brand{font-size:22px;font-weight:900;color:#d85a00}
    nav{display:flex;gap:8px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:10px 13px;background:#ff7a18;color:white;font-weight:900;cursor:pointer}
    nav button{background:#fff0df;color:#d85a00}
    main{max-width:1000px;margin:auto;padding:14px}
    .page{display:none}.page.active{display:block}
    .hero{background:linear-gradient(135deg,#321c10,#ff7a18);color:white;border-radius:28px;padding:32px;box-shadow:0 14px 34px #0002}
    h1{font-size:clamp(36px,7vw,66px);line-height:.95;margin-bottom:14px}
    h2{font-size:32px;margin:22px 0 14px;color:#321c10}
    .box,.product,.cart-card,.order{background:white;border-radius:20px;padding:16px;margin-top:14px;box-shadow:0 8px 22px #0001}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .product-img{height:145px;background:#fff0df;border-radius:16px;display:grid;place-items:center;font-size:68px;margin-bottom:10px;position:relative}
    .badge{position:absolute;top:9px;left:9px;background:white;color:#d85a00;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:900}
    .price{font-size:20px;font-weight:900;color:#d85a00}
    .row{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;background:white;border-radius:18px;padding:12px;margin-bottom:14px}
    input,select,textarea{width:100%;border:1px solid #f0ded1;border-radius:12px;padding:11px}
    form{display:grid;gap:12px}.hidden{display:none!important}
    .checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.checks label{background:#fff7ef;border-radius:12px;padding:10px}
    .cart-line{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;border-bottom:1px solid #f0ded1;padding:10px 0}
    .qty{display:flex;gap:8px;align-items:center}.qty button{background:#fff0df;color:#d85a00;width:30px;height:30px;padding:0}
    .total{font-size:22px;font-weight:900;color:#d85a00;background:#fff7ef;border-radius:14px;padding:12px;margin-top:12px;display:flex;justify-content:space-between}
    .danger{background:#d93636}.green{background:#14a765}.dark{background:#321c10}
    .status{display:inline-block;border-radius:999px;padding:6px 9px;background:#ffe5c9;color:#9e4200;font-weight:900;font-size:12px}.ready{background:#defdea;color:#087638}.done{background:#eee;color:#555}
    #toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:#321c10;color:white;padding:12px 15px;border-radius:14px;font-weight:900;transition:.25s;z-index:99}#toast.show{transform:translateX(-50%) translateY(0)}
    @media(max-width:750px){header{flex-direction:column;align-items:flex-start}.grid{grid-template-columns:1fr 1fr}.toolbar{grid-template-columns:1fr}.checks{grid-template-columns:1fr}}
    @media(max-width:520px){.grid{grid-template-columns:1fr}.cart-line{grid-template-columns:1fr}.hero{padding:22px}}
  </style>
</head>
<body>
<header>
  <div class="brand">🍽️ Lerisfood</div>
  <nav>
    <button onclick="showPage('home')">Accueil</button>
    <button onclick="showPage('menu')">Menu</button>
    <button onclick="showPage('cart')">Panier <span id="cartCount">0</span></button>
    <button onclick="showPage('admin')">Admin</button>
  </nav>
</header>
<main>
  <section id="home" class="page active">
    <div class="hero"><h1>Commandez vos douceurs en ligne.</h1><p>Milkshakes, caipiriñas et crêpes. Paiement sur place.</p><br><button onclick="showPage('menu')">Voir le menu</button></div>
    <div class="box"><h2>GitHub Pages</h2><p>Un seul fichier index.html. Pas besoin de télécharger d’autres fichiers.</p></div>
  </section>
  <section id="menu" class="page"><h2>Menu</h2><div class="toolbar"><input id="search" placeholder="Rechercher..." oninput="renderProducts()"><select id="category" onchange="renderProducts()"><option value="all">Tout</option><option>Milkshakes</option><option>Caipiriñas</option><option>Crêpes</option></select></div><div id="products" class="grid"></div></section>
  <section id="cart" class="page"><h2>Panier</h2><div id="cartItems"></div><form id="orderForm" class="box"><h3>Finaliser la commande</h3><input id="clientName" required placeholder="Nom du client"><input id="clientPhone" placeholder="Téléphone optionnel"><div class="checks"><label><input type="checkbox" value="Algérienne"> Algérienne</label><label><input type="checkbox" value="Ketchup"> Ketchup</label><label><input type="checkbox" value="Samouraï"> Samouraï</label></div><textarea id="note" placeholder="Note..."></textarea><button type="submit">Valider la commande</button></form></section>
  <section id="admin" class="page"><h2>Admin</h2><div id="loginBox" class="box"><input id="adminCode" type="password" placeholder="Code : 1234"><br><br><button class="dark" onclick="unlockAdmin()">Entrer</button></div><div id="adminPanel" class="hidden"><button class="dark" onclick="exportOrders()">Exporter CSV</button> <button class="danger" onclick="clearOrders()">Effacer</button> <button onclick="lockAdmin()">Verrouiller</button><div id="orders"></div></div></section>
  <section id="thanks" class="page"><div class="box"><h2>✅ Commande validée !</h2><p>Paiement sur place au comptoir.</p><br><button onclick="showPage('menu')">Nouvelle commande</button></div></section>
</main>
<div id="toast"></div>
<script>
const ADMIN_PIN='1234';
const products=[['milkshake-fraise','Milkshake Fraise','Milkshakes',4,'🍓'],['milkshake-chocolat','Milkshake Chocolat','Milkshakes',4,'🍫'],['milkshake-oreo','Milkshake Oreo','Milkshakes',4.5,'🍪'],['milkshake-caramel','Milkshake Caramel','Milkshakes',4.5,'🍯'],['caipirinha-fraise','Caipiriña Fraise','Caipiriñas',3.5,'🍓'],['caipirinha-citron','Caipiriña Citron','Caipiriñas',3.5,'🍋'],['caipirinha-gingembre','Caipiriña Gingembre','Caipiriñas',3.5,'🫚'],['caipirinha-maracuja','Caipiriña Maracujá','Caipiriñas',3.5,'🥭'],['crepe-confiture','Crêpe Confiture','Crêpes',2.5,'🍓'],['crepe-nutella','Crêpe Nutella','Crêpes',3,'🍫'],['crepe-jambon-fromage','Crêpe Jambon Fromage','Crêpes',4,'🧀'],['crepe-saucisse','Crêpe Saucisse','Crêpes',4,'🌭']].map(p=>({id:p[0],name:p[1],category:p[2],price:p[3],emoji:p[4]}));
let cart=JSON.parse(localStorage.getItem('lerisfood_cart')||'[]'),orders=JSON.parse(localStorage.getItem('lerisfood_orders')||'[]'),adminUnlocked=sessionStorage.getItem('lerisfood_admin')==='yes';
function money(n){return Number(n).toFixed(2).replace('.',',')+' €'}function save(){localStorage.setItem('lerisfood_cart',JSON.stringify(cart));localStorage.setItem('lerisfood_orders',JSON.stringify(orders))}function toast(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='menu')renderProducts();if(id==='cart')renderCart();if(id==='admin')renderAdmin();scrollTo({top:0,behavior:'smooth'})}
function renderProducts(){let q=document.getElementById('search').value.toLowerCase(),c=document.getElementById('category').value,list=products.filter(p=>(c==='all'||p.category===c)&&(p.name+' '+p.category).toLowerCase().includes(q));document.getElementById('products').innerHTML=list.map(p=>`<article class="product"><div class="product-img"><span class="badge">${p.category}</span>${p.emoji}</div><h3>${p.name}</h3><p>Paiement sur place</p><div class="row"><span class="price">${money(p.price)}</span><button onclick="addToCart('${p.id}')">Ajouter</button></div></article>`).join('')||'<div class="box">Aucun produit trouvé.</div>'}
function addToCart(id){let p=products.find(x=>x.id===id),it=cart.find(x=>x.id===id);it?it.qty++:cart.push({id:p.id,name:p.name,price:p.price,qty:1});save();updateCount();toast(p.name+' ajouté')}function changeQty(id,d){let it=cart.find(x=>x.id===id);if(!it)return;it.qty+=d;if(it.qty<=0)cart=cart.filter(x=>x.id!==id);save();updateCount();renderCart()}function total(){return cart.reduce((s,i)=>s+i.price*i.qty,0)}function updateCount(){document.getElementById('cartCount').textContent=cart.reduce((s,i)=>s+i.qty,0)}
function renderCart(){let box=document.getElementById('cartItems'),form=document.getElementById('orderForm');if(!cart.length){box.innerHTML='<div class="box">Panier vide.</div>';form.classList.add('hidden');return}form.classList.remove('hidden');box.innerHTML=`<div class="cart-card">${cart.map(i=>`<div class="cart-line"><div><b>${i.name}</b><br>${money(i.price)} x ${i.qty}</div><div class="qty"><button onclick="changeQty('${i.id}',-1)">-</button><b>${i.qty}</b><button onclick="changeQty('${i.id}',1)">+</button></div><b>${money(i.price*i.qty)}</b></div>`).join('')}<div class="total"><span>Total</span><b>${money(total())}</b></div></div>`}
document.getElementById('orderForm').addEventListener('submit',e=>{e.preventDefault();let name=document.getElementById('clientName').value.trim();if(!name)return toast('Ajoute le nom');let sauces=[...document.querySelectorAll('.checks input:checked')].map(i=>i.value);orders.unshift({id:Date.now(),number:orders.length+1,date:new Date().toLocaleString('fr-FR'),name,phone:clientPhone.value,note:note.value,sauces,items:cart.map(i=>({...i})),total:total(),status:'À préparer'});cart=[];save();updateCount();e.target.reset();showPage('thanks')});
function unlockAdmin(){if(adminCode.value.trim()!==ADMIN_PIN)return toast('Code incorrect');adminUnlocked=true;sessionStorage.setItem('lerisfood_admin','yes');renderAdmin()}function lockAdmin(){adminUnlocked=false;sessionStorage.removeItem('lerisfood_admin');renderAdmin()}function renderAdmin(){loginBox.classList.toggle('hidden',adminUnlocked);adminPanel.classList.toggle('hidden',!adminUnlocked);if(!adminUnlocked)return;orders.innerHTML=orders.length?orders.map(o=>`<article class="order"><div><b>Commande #${o.number}</b> <span class="status ${o.status==='Prêt'?'ready':o.status==='Terminé'?'done':''}">${o.status}</span><br><small>${o.date}</small></div><div><b>${o.name}</b> ${o.phone||''}</div><div>${o.items.map(i=>`${i.qty}x ${i.name} — ${money(i.price*i.qty)}`).join('<br>')}<br><b>Total : ${money(o.total)}</b>${o.sauces.length?'<br>🌶️ '+o.sauces.join(', '):''}${o.note?'<br>📝 '+o.note:''}</div><div class="order-actions"><button onclick="setStatus(${o.id},'À préparer')">À préparer</button><button class="green" onclick="setStatus(${o.id},'Prêt')">Prêt</button><button class="dark" onclick="setStatus(${o.id},'Terminé')">Terminé</button><button class="danger" onclick="deleteOrder(${o.id})">Supprimer</button></div></article>`).join(''):'<div class="box">Aucune commande.</div>'}
function setStatus(id,s){let o=orders.find(x=>x.id===id);if(o){o.status=s;save();renderAdmin()}}function deleteOrder(id){if(confirm('Supprimer ?')){orders=orders.filter(x=>x.id!==id);save();renderAdmin()}}function clearOrders(){if(confirm('Effacer toutes les commandes ?')){orders=[];save();renderAdmin()}}function exportOrders(){let rows=[['Numero','Date','Client','Produits','Total','Statut']];orders.forEach(o=>rows.push([o.number,o.date,o.name,o.items.map(i=>`${i.qty}x ${i.name}`).join(' | '),money(o.total),o.status]));let csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(';')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='commandes_lerisfood.csv';a.click()}
renderProducts();renderCart();renderAdmin();updateCount();
</script>
</body>
</html>
